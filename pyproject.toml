[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = [
  "B008",  # FastAPI の Depends() はデフォルト引数での関数呼び出しが必須パターン
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.black]
line-length = 88
target-version = ["py314"]

[tool.mypy]
python_version = "3.14"
strict = true
warn_unused_configs = true
disallow_untyped_defs = true

[[tool.mypy.overrides]]
module = ["firebase_admin", "firebase_admin.*"]
ignore_missing_imports = true