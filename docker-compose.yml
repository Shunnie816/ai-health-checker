services:
  backend:
    build:
      context: backend
    ports:
      - "8000:8080"
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-credentials.json
    volumes:
      - ./backend/src:/app/src
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/tmp/gcp-credentials.json:ro
    command: uvicorn ai_health_checker.main:app --host 0.0.0.0 --port 8080 --reload
