<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Core components</title>
<style>
:root {
  /* Primary: calm teal */
  --color-primary:        oklch(0.56 0.11 195);
  --color-primary-hover:  oklch(0.50 0.12 195);
  --color-primary-subtle: oklch(0.94 0.03 195);

  /* Secondary: soft sage */
  --color-secondary:        oklch(0.62 0.09 148);
  --color-secondary-subtle: oklch(0.94 0.03 148);

  /* Background & Surface */
  --color-bg:        oklch(0.98 0.004 240);
  --color-surface-1: oklch(0.96 0.004 240);
  --color-surface-2: oklch(0.92 0.005 240);

  /* Text */
  --color-text-primary:   oklch(0.18 0.010 240);
  --color-text-secondary: oklch(0.40 0.010 240);
  --color-text-muted:     oklch(0.60 0.010 240);

  /* Border */
  --color-border:        oklch(0.88 0.005 240);
  --color-border-strong: oklch(0.78 0.008 240);

  /* Danger */
  --color-danger:        oklch(0.55 0.18 25);
  --color-danger-subtle: oklch(0.95 0.04 25);

  /* Emotion score: -5 → +5（JS の getEmotionColor から参照） */
  --color-emotion-n5: oklch(0.46 0.18 24);
  --color-emotion-n4: oklch(0.53 0.16 29);
  --color-emotion-n3: oklch(0.62 0.14 44);
  --color-emotion-n2: oklch(0.71 0.12 65);
  --color-emotion-n1: oklch(0.78 0.10 90);
  --color-emotion-0:  oklch(0.70 0.02 240);
  --color-emotion-p1: oklch(0.74 0.09 148);
  --color-emotion-p2: oklch(0.67 0.11 152);
  --color-emotion-p3: oklch(0.61 0.13 158);
  --color-emotion-p4: oklch(0.57 0.13 170);
  --color-emotion-p5: oklch(0.53 0.12 188);

  /* Fatigue: 1 (fresh) → 5 (exhausted)（JS の getFatigueColor から参照） */
  --color-fatigue-1: oklch(0.62 0.13 158);
  --color-fatigue-2: oklch(0.68 0.10 135);
  --color-fatigue-3: oklch(0.76 0.10  80);
  --color-fatigue-4: oklch(0.63 0.15  44);
  --color-fatigue-5: oklch(0.50 0.17  25);

  /* Shadows */
  --shadow-card:    0 1px 3px oklch(0.18 0.01 240 / 0.08), 0 1px 2px oklch(0.18 0.01 240 / 0.06);
  --shadow-overlay: 0 8px 24px oklch(0.18 0.01 240 / 0.16), 0 2px 8px oklch(0.18 0.01 240 / 0.10);
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-bg:        oklch(0.14 0.010 240);
    --color-surface-1: oklch(0.18 0.010 240);
    --color-surface-2: oklch(0.23 0.010 240);
    --color-primary:        oklch(0.65 0.11 195);
    --color-primary-hover:  oklch(0.70 0.11 195);
    --color-primary-subtle: oklch(0.22 0.05 195);
    --color-secondary:        oklch(0.68 0.09 148);
    --color-secondary-subtle: oklch(0.22 0.04 148);
    --color-text-primary:   oklch(0.92 0.005 240);
    --color-text-secondary: oklch(0.72 0.008 240);
    --color-text-muted:     oklch(0.52 0.008 240);
    --color-border:        oklch(0.28 0.010 240);
    --color-border-strong: oklch(0.38 0.010 240);
    --color-danger:        oklch(0.62 0.18 25);
    --color-danger-subtle: oklch(0.20 0.06 25);
    --color-emotion-n5: oklch(0.55 0.17 24);
    --color-emotion-n4: oklch(0.60 0.15 29);
    --color-emotion-n3: oklch(0.68 0.13 44);
    --color-emotion-n2: oklch(0.76 0.11 65);
    --color-emotion-n1: oklch(0.82 0.09 90);
    --color-emotion-0:  oklch(0.60 0.02 240);
    --color-emotion-p1: oklch(0.76 0.09 148);
    --color-emotion-p2: oklch(0.70 0.11 152);
    --color-emotion-p3: oklch(0.65 0.13 158);
    --color-emotion-p4: oklch(0.62 0.13 170);
    --color-emotion-p5: oklch(0.60 0.12 188);
    --color-fatigue-1: oklch(0.65 0.13 158);
    --color-fatigue-2: oklch(0.70 0.10 135);
    --color-fatigue-3: oklch(0.78 0.10  80);
    --color-fatigue-4: oklch(0.66 0.15  44);
    --color-fatigue-5: oklch(0.56 0.17  25);
    --shadow-card:    0 1px 3px oklch(0 0 0 / 0.30), 0 1px 2px oklch(0 0 0 / 0.20);
    --shadow-overlay: 0 8px 24px oklch(0 0 0 / 0.50), 0 2px 8px oklch(0 0 0 / 0.30);
  }
}
@media (prefers-color-scheme: dark) {
  input[type="date"],
  input[type="time"] { color-scheme: dark; }
}
* { box-sizing: border-box; margin: 0; }
body {
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
  background: var(--color-bg); color: var(--color-text-primary);
  padding: 20px; font-size: 14px;
}
h2 { font-size: 12px; font-weight: 600; letter-spacing: .04em; color: var(--color-text-muted); margin: 24px 0 10px; text-transform: uppercase; }
h2:first-of-type { margin-top: 0; }
.row { display: flex; flex-wrap: wrap; gap: 10px; }
.sw { width: 108px; }
.chip { height: 44px; border-radius: 8px; border: 1px solid var(--color-border); }
.name { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>
<h2>Page header</h2>
<div style="border:1px solid var(--color-border);border-radius:12px;overflow:hidden;max-width:420px">
  <div style="display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--color-border);background:var(--color-bg);padding:14px 20px 12px">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="display:flex;height:32px;width:32px;align-items:center;justify-content:center;border-radius:9999px;color:var(--color-text-secondary)">
        <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <div>
        <div style="font-size:20px;font-weight:600;letter-spacing:-.01em">グラフ</div>
        <div style="margin-top:2px;font-size:13px;color:var(--color-text-muted)">トレンド可視化</div>
      </div>
    </div>
    <button style="border:none;border-radius:9999px;background:var(--color-primary);color:#fff;padding:8px 16px;font-size:13px;font-weight:500;font-family:inherit">分析を実行</button>
  </div>
  <div style="padding:12px 16px;background:var(--color-bg)"><span class="name">PageHeader（title / subtitle / backHref / actions）</span></div>
</div>
<h2>Log card</h2>
<div style="max-width:420px;display:flex;flex-direction:column;gap:10px;border-radius:12px;border:1px solid var(--color-border);background:var(--color-surface-1);padding:16px">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:14px;font-weight:500">2026/07/11 土</span>
      <span style="border-radius:9999px;background:var(--color-surface-2);padding:2px 6px;font-size:11px;font-weight:500;color:var(--color-text-muted)">平日</span>
    </div>
    <svg width="7" height="12" viewBox="0 0 7 12" fill="none" style="opacity:.3"><path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div style="display:flex;align-items:center">
    <div style="flex:1"><div class="name">朝の気分</div><div style="display:flex;align-items:center;gap:6px"><span style="height:8px;width:8px;border-radius:9999px;background:var(--color-emotion-p3)"></span><span style="font-size:15px;font-weight:600;color:var(--color-emotion-p3)">+3</span></div></div>
    <div style="height:30px;width:1px;background:var(--color-border)"></div>
    <div style="flex:1;padding-left:14px"><div class="name">疲れ度</div><div style="display:flex;align-items:center;gap:6px"><span style="height:8px;width:8px;border-radius:9999px;background:var(--color-fatigue-2)"></span><span style="font-size:15px;font-weight:600;color:var(--color-fatigue-2)">2</span></div></div>
    <div style="height:30px;width:1px;background:var(--color-border)"></div>
    <div style="flex:1;padding-left:14px"><div class="name">残業スコア</div><span style="font-size:15px;font-weight:600;color:var(--color-primary)">0</span></div>
  </div>
</div>
<h2>Buttons &amp; pills</h2>
<div class="row" style="align-items:center">
  <button style="border:none;border-radius:9999px;background:var(--color-primary);color:#fff;padding:8px 16px;font-size:13px;font-weight:500;font-family:inherit">AI分析</button>
  <button style="border:1px solid var(--color-border);border-radius:9999px;background:transparent;color:var(--color-text-secondary);padding:8px 14px;font-size:13px;font-family:inherit">グラフ</button>
  <button style="border:none;border-radius:12px;background:var(--color-primary);color:#fff;padding:15px 28px;font-size:16px;font-weight:600;font-family:inherit">記録する</button>
  <button style="border:none;border-radius:12px;background:var(--color-danger);color:#fff;padding:15px 28px;font-size:16px;font-weight:600;font-family:inherit">削除する</button>
  <span style="display:flex;height:56px;width:56px;align-items:center;justify-content:center;border-radius:9999px;background:var(--color-primary);color:#fff;font-size:28px;box-shadow:var(--shadow-overlay)">+</span>
</div>
<h2>Status</h2>
<div style="max-width:420px;display:flex;flex-direction:column;gap:10px">
  <p style="border-radius:12px;background:var(--color-danger-subtle);padding:12px 16px;font-size:13px;color:var(--color-danger)">ログの取得に失敗しました</p>
  <p style="border-radius:12px;background:var(--color-primary-subtle);padding:12px 16px;font-size:13px;color:var(--color-text-secondary)">AIが直近のログを分析しています。1分ほどかかることがあります。</p>
  <p style="text-align:center;color:var(--color-text-muted)">読み込み中...</p>
  <p style="text-align:center;line-height:1.6;color:var(--color-text-muted)">まだログがありません。<br>最初の記録をつけましょう！</p>
</div>
</body>
</html>
