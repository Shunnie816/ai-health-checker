name: Deploy Backend (Staging)

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch: {}

env:
  REGION: asia-northeast1
  REPOSITORY: backend
  SERVICE: ai-health-checker-api
  PROJECT_ID: ai-health-checker-stg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_STAGING }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }}
          docker build -t $IMAGE backend/
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          project_id: ${{ env.PROJECT_ID }}
          # --set-env-vars はプレーン環境変数を全置換するため、--clear-env-vars と同様に
          # 古い変数の残留を防げる（両フラグは併用不可）。^;^ は値内カンマのための区切り文字指定
          flags: >-
            --port=8080 --allow-unauthenticated
            --set-env-vars=^;^CORS_ALLOWED_ORIGINS=https://ai-health-checker.shunniehub.com,https://ai-health-checker--ai-health-checker-stg.asia-east1.hosted.app,http://localhost:3000
            --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,SCHEDULER_API_KEY=SCHEDULER_API_KEY:latest,SMTP_HOST=SMTP_HOST:latest,SMTP_PORT=SMTP_PORT:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,EMAIL_FROM=EMAIL_FROM:latest
